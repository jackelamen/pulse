<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pulse offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f9fc;
        color: #121225;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 360px;
        padding: 24px;
        text-align: center;
      }
      .mark {
        width: 56px;
        height: 56px;
        margin: 0 auto 18px;
        border-radius: 16px;
        background: #f25c2a;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #596070;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark"></div>
      <h1>Pulse is offline</h1>
      <p>Open a page you visited recently, or reconnect and Pulse will pick back up.</p>
    </main>
  </body>
</html>
